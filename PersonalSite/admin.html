<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>Blog Admin // whoami</title>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f12;
            --accent-green: #00ff66;
            --accent-red: #ff3366;
            --text-main: #f0f3f6;
            --text-muted: #95a5b2;
            --border-light: rgba(255, 255, 255, 0.08);
            --font-mono: 'JetBrains Mono', monospace;
            --card-bg: #12181c;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        /* AUTH GATE */
        #auth-gate {
            position: fixed;
            inset: 0;
            background-color: var(--bg-color);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #auth-gate.hidden {
            display: none;
        }

        .auth-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-logo {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .auth-logo span {
            color: var(--accent-green);
        }

        .auth-biometric-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(0, 255, 102, 0.08);
            border: 1.5px solid rgba(0, 255, 102, 0.3);
            color: var(--accent-green);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            font-size: 28px;
        }

        .auth-input {
            width: 100%;
            background-color: rgba(11, 15, 18, 0.6);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 12px 14px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 14px;
        }

        .auth-submit-btn {
            width: 100%;
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* LAYOUT */
        #admin-app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--card-bg);
            border-right: 1px solid var(--border-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: var(--accent-green);
            font-family: var(--font-mono);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .nav-tab {
            padding: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 8px;
            font-family: var(--font-mono);
            font-size: 14px;
        }

        .nav-tab:hover,
        .nav-tab.active {
            background: rgba(0, 255, 102, 0.1);
            color: var(--accent-green);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* FORMS & CARDS */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 26px;
            margin-bottom: 26px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background-color: rgba(11, 15, 18, 0.5);
            border: 1px solid var(--border-light);
            border-radius: 5px;
            padding: 11px 13px;
            color: #ffffff;
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        .btn {
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--accent-green);
            color: var(--bg-color);
        }

        .btn-red {
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .btn-red:hover {
            background: var(--accent-red);
            color: white;
        }

        /* TABLE / POSTS */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        th {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
        }

        .action-btns button {
            margin-right: 8px;
            font-size: 10px;
            padding: 4px 8px;
        }

        /* MODAL FOR CROPPER */
        .crop-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .crop-container {
            width: 80%;
            height: 80%;
            background: #111;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .img-container {
            flex: 1;
            overflow: hidden;
        }

        .crop-actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* THUMBS */
        .thumb-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .thumb-item {
            width: 80px;
            height: 80px;
            border: 1px solid var(--border-light);
            position: relative;
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-remove {
            position: absolute;
            top: 0;
            right: 0;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            #admin-app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                padding: 15px;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 5px;
            }

            .sidebar h2 {
                margin-bottom: 0;
                width: 100%;
                text-align: center;
                margin-bottom: 10px;
            }

            .nav-tab {
                padding: 8px 10px;
                margin-bottom: 0;
                font-size: 12px;
                flex: 1;
                text-align: center;
                white-space: nowrap;
            }

            .main-content {
                padding: 15px;
            }

            .card {
                padding: 15px;
            }

            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
                width: 100%;
            }

            .action-btns button {
                margin-right: 5px;
                margin-bottom: 5px;
            }
        }
    </style>
</head>

<body>

    <div id="auth-gate">
        <div class="auth-card">
            <div class="auth-logo">whoami<span>.</span></div>
            <p style="margin-bottom:20px; color:var(--text-muted);">Admin Panel</p>
            <button class="auth-biometric-btn" id="bio-login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2C9.38 2 7 3.38 5.5 5.5" />
                    <path d="M18.5 5.5C17 3.38 14.62 2 12 2" />
                    <path d="M12 8a4 4 0 0 1 4 4c0 1.5-.5 3-1.5 4" />
                    <path d="M8 12a4 4 0 0 1 4-4" />
                    <path d="M7 16.5C6 15 5.5 13.5 5.5 12a6.5 6.5 0 0 1 .74-3" />
                    <path d="M12 8v1" />
                    <path d="M12 12v4" />
                    <path d="M9 16c.6 1 1.3 1.8 2 2.4" />
                    <path d="M15.5 16.5c-.5.8-1 1.5-1.5 2" />
                    <path d="M18 13c0 2-.5 4-2 5.5" />
                </svg>
            </button>
            <button id="bio-register-btn"
                style="background:none; border:none; color:var(--accent-green); cursor:pointer; font-family:var(--font-mono); margin-bottom: 20px; font-size:12px;">Register
                Device (WebAuthn)</button>
            <div style="margin-bottom:10px;">or</div>
            <input type="text" id="auth-username" class="auth-input" placeholder="Username (admin)">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password">
            <button id="auth-submit" class="auth-submit-btn">Login</button>
            <div id="auth-error" style="color:var(--accent-red); margin-top:10px; font-size:12px;"></div>
        </div>
    </div>

    <div id="admin-app" style="display:none;">
        <div class="sidebar">
            <h2>whoami<span>.</span></h2>
            <div class="nav-tab active" data-tab="create">Create Post</div>
            <div class="nav-tab" data-tab="manage">Manage Posts</div>
            <div class="nav-tab" data-tab="settings">Settings</div>
            <div class="nav-tab" id="logout-btn">Logout</div>
        </div>

        <div class="main-content">
            <!-- CREATE/EDIT POST TAB -->
            <div id="create" class="tab-content active">
                <h1 style="margin-bottom:20px; color:white;">Post Editor</h1>
                <div class="card">
                    <form id="post-form">
                        <input type="hidden" id="edit-post-id">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="post-title" required>
                        </div>
                        <div class="form-group">
                            <label>Content</label>
                            <textarea id="post-content" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Images (Carousel)</label>
                            <input type="file" id="carousel-input" accept="image/*" multiple>
                            <div class="thumb-strip" id="carousel-thumbs"></div>
                        </div>
                        <button type="submit" class="btn" id="save-post-btn">Save Post</button>
                    </form>
                </div>
            </div>

            <!-- MANAGE POSTS TAB -->
            <div id="manage" class="tab-content">
                <h1 style="margin-bottom:20px; color:white;">Manage Content</h1>
                <div class="card">
                    <table id="posts-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- SETTINGS TAB -->
            <div id="settings" class="tab-content">
                <h1 style="margin-bottom:20px; color:white;">Global Settings</h1>
                <div class="card">
                    <div class="form-group">
                        <label><input type="checkbox" id="set-cache"> Enable Cache Control</label>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="set-analytics"> Toggle Analytics</label>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="set-maintenance"> Maintenance Switch</label>
                    </div>
                    <div class="form-group">
                        <label>Image Quality Slider</label>
                        <select id="set-quality">
                            <option value="low">Low</option>
                            <option value="high">High</option>
                            <option value="lossless">Lossless</option>
                        </select>
                    </div>
                    <button class="btn" id="save-settings-btn">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CROP MODAL -->
    <div class="crop-modal" id="crop-modal">
        <div class="crop-container">
            <h2 style="color:white; margin-bottom:10px;">Crop Image</h2>
            <div class="img-container">
                <img id="crop-image" src="" style="max-width:100%;">
            </div>
            <div class="crop-actions">
                <button class="btn btn-red" id="crop-cancel">Cancel</button>
                <button class="btn" id="crop-save">Save Crop</button>
            </div>
        </div>
    </div>

    <script>
        // TABS
        const tabs = document.querySelectorAll('.nav-tab[data-tab]');
        const contents = document.querySelectorAll('.tab-content');
        tabs.forEach(t => {
            t.addEventListener('click', () => {
                tabs.forEach(x => x.classList.remove('active'));
                contents.forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                document.getElementById(t.dataset.tab).classList.add('active');
                if (t.dataset.tab === 'manage') loadPosts();
                if (t.dataset.tab === 'settings') loadSettings();
            });
        });



        // AUTH
        const authGate = document.getElementById('auth-gate');
        const adminApp = document.getElementById('admin-app');

        // WebAuthn
        const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;

        document.getElementById('bio-register-btn').addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/v1/webauthn/register/generate');
                const options = await resp.json();
                const attResp = await startRegistration(options);
                await fetch('/api/v1/webauthn/register/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(attResp)
                });
                alert('Device registered successfully! You can now login with biometrics.');
            } catch (e) { console.error(e); alert('Registration failed'); }
        });

        document.getElementById('bio-login-btn').addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/v1/webauthn/authenticate/generate');
                const options = await resp.json();
                const asseResp = await startAuthentication(options);
                const verify = await fetch('/api/v1/webauthn/authenticate/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(asseResp)
                });
                if (verify.ok) {
                    authGate.classList.add('hidden');
                    adminApp.style.display = 'flex';
                    loadPosts();
                } else { alert('Verification failed'); }
            } catch (e) { console.error(e); alert('Login failed'); }
        });

        document.getElementById('auth-submit').addEventListener('click', async () => {
            const username = document.getElementById('auth-username').value;
            const pw = document.getElementById('auth-password').value;
            const resp = await fetch('/api/v1/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: pw })
            });
            if (resp.ok) {
                authGate.classList.add('hidden');
                adminApp.style.display = 'flex';
                loadPosts();
            } else {
                document.getElementById('auth-error').innerText = "Invalid username or password";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/v1/logout', { method: 'POST' });
            authGate.classList.remove('hidden');
            adminApp.style.display = 'none';
        });

        // POSTS CRUD
        let posts = [];
        async function loadPosts() {
            const r = await fetch('/api/v1/posts');
            posts = await r.json();
            const tbody = document.querySelector('#posts-table tbody');
            tbody.innerHTML = '';
            posts.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td>${p.title}</td>
                <td>${p.updated_at}</td>
                <td class="action-btns">
                    <button class="btn" onclick="editPost('${p.slug}')">Edit</button>
                    <button class="btn btn-red" onclick="deletePost('${p.slug}')">Delete</button>
                </td>
            `;
                tbody.appendChild(tr);
            });
        }

        async function deletePost(slug) {
            if (!confirm('Are you sure?')) return;
            await fetch(`/api/v1/posts/${slug}`, { method: 'DELETE' });
            loadPosts();
        }

        let currentImages = [];

        function renderThumbs() {
            const strip = document.getElementById('carousel-thumbs');
            strip.innerHTML = '';
            currentImages.forEach((img, i) => {
                const div = document.createElement('div');
                div.className = 'thumb-item';
                div.innerHTML = `<img src="${img.data || '../' + img.path}">
                             <button class="thumb-remove" onclick="removeImage(${i})" type="button">&times;</button>`;
                strip.appendChild(div);
            });
        }

        window.removeImage = function (i) {
            currentImages.splice(i, 1);
            renderThumbs();
        };

        window.editPost = function (slug) {
            const p = posts.find(x => x.slug === slug);
            if (!p) return;
            document.getElementById('edit-post-id').value = p.slug;
            document.getElementById('post-title').value = p.title;
            document.getElementById('post-content').value = p.content;

            currentImages = (p.image_paths || []).map(path => ({ path }));
            renderThumbs();

            // Switch to create tab
            tabs.forEach(x => x.classList.remove('active'));
            contents.forEach(x => x.classList.remove('active'));
            document.querySelector('[data-tab="create"]').classList.add('active');
            document.getElementById('create').classList.add('active');
        };

        // IMAGE CROPPER
        let cropper = null;
        let pendingFile = null;
        let pendingFiles = [];
        const cropModal = document.getElementById('crop-modal');
        const cropImg = document.getElementById('crop-image');

        function processNextCrop() {
            if (pendingFiles.length === 0) return;
            pendingFile = pendingFiles.shift();
            const reader = new FileReader();
            reader.onload = ev => {
                cropImg.src = ev.target.result;
                cropModal.style.display = 'flex';
                if (cropper) cropper.destroy();
                cropper = new Cropper(cropImg, {
                    aspectRatio: 4 / 3, // Enforce 4:3
                    viewMode: 1
                });
            };
            reader.readAsDataURL(pendingFile);
        }

        document.getElementById('carousel-input').addEventListener('change', e => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            pendingFiles = pendingFiles.concat(files);
            if (cropModal.style.display !== 'flex') {
                processNextCrop();
            }
            e.target.value = '';
        });

        document.getElementById('crop-cancel').addEventListener('click', () => {
            cropModal.style.display = 'none';
            if (cropper) cropper.destroy();
            pendingFiles = []; // clear the queue if cancelled
        });

        document.getElementById('crop-save').addEventListener('click', () => {
            if (!cropper) return;
            // Optimize to WebP
            const canvas = cropper.getCroppedCanvas();
            const dataUrl = canvas.toDataURL('image/webp', 0.8);
            currentImages.push({ name: pendingFile.name.replace(/\.[^/.]+$/, "") + ".webp", data: dataUrl });
            renderThumbs();
            cropModal.style.display = 'none';
            cropper.destroy();

            if (pendingFiles.length > 0) {
                processNextCrop();
            }
        });

        document.getElementById('post-form').addEventListener('submit', async e => {
            e.preventDefault();
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const slug = document.getElementById('edit-post-id').value;

            const payload = { title, content, images: currentImages };

            let url = '/api/v1/posts';
            let method = 'POST';
            if (slug) {
                url += '/' + slug;
                method = 'PUT';
            }

            const r = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (r.ok) {
                alert('Post saved');
                document.getElementById('post-form').reset();
                document.getElementById('edit-post-id').value = '';
                currentImages = [];
                renderThumbs();
                tabs[1].click(); // go to manage
            } else {
                alert('Error saving post');
            }
        });

        // SETTINGS
        async function loadSettings() {
            const r = await fetch('/api/v1/settings');
            const s = await r.json();
            document.getElementById('set-cache').checked = s.cache_enabled || false;
            document.getElementById('set-analytics').checked = s.analytics_enabled || false;
            document.getElementById('set-maintenance').checked = s.maintenance_mode || false;
            document.getElementById('set-quality').value = s.image_quality || 'high';
        }

        document.getElementById('save-settings-btn').addEventListener('click', async () => {
            const payload = {
                cache_enabled: document.getElementById('set-cache').checked,
                analytics_enabled: document.getElementById('set-analytics').checked,
                maintenance_mode: document.getElementById('set-maintenance').checked,
                image_quality: document.getElementById('set-quality').value,
            };
            const r = await fetch('/api/v1/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (r.ok) alert('Settings saved');
        });

    </script>
</body>

</html>
