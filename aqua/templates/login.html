<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login - Evolv.Aqua</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico?v=2">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="d-flex flex-column justify-content-center align-items-center">
    <a href="/" class="nav-brand mb-2" style="position: absolute; top: 1.5rem; left: 2rem;">Evolv.Aqua</a>

    <div class="glass-panel" style="width: 100%; max-width: 400px;">
        <h2 class="text-center" style="font-family: var(--font-mono); color: var(--accent-primary);">LOGIN</h2>
        <div id="error-msg" class="text-center mb-1"
            style="color: var(--accent-secondary); display: none; font-size: 0.85rem;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <div class="text-center mt-2" style="font-size: 0.85rem;">
            <span class="text-muted">Don't have an account?</span>
            <a href="/register_page" style="color: var(--accent-primary); text-decoration: none;">Register</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorMsg.textContent = data.detail || 'Login failed';
                    errorMsg.style.display = 'block';
                } else {
                    window.location.href = '/';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
