<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Register - Evolv.Aqua</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="d-flex flex-column justify-content-center align-items-center">
    <a href="/" class="nav-brand mb-2" style="position: absolute; top: 1.5rem; left: 2rem;">Evolv.Aqua</a>
    
    <div class="glass-panel" style="width: 100%; max-width: 400px;">
        <h2 class="text-center" style="font-family: var(--font-mono); color: var(--accent-primary);">REGISTER</h2>
        <div id="msg" class="text-center mb-1" style="display: none; font-size: 0.85rem;"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>
        
        <div class="text-center mt-2" style="font-size: 0.85rem;">
            <span class="text-muted">Already have an account?</span> 
            <a href="/login_page" style="color: var(--accent-primary); text-decoration: none;">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');
            
            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (!res.ok) {
                    msgBox.textContent = data.detail || 'Registration failed';
                    msgBox.style.color = 'var(--accent-secondary)';
                    msgBox.style.display = 'block';
                } else {
                    msgBox.textContent = data.message;
                    msgBox.style.color = 'var(--accent-primary)';
                    msgBox.style.display = 'block';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => window.location.href = '/login_page', 3000);
                }
            } catch (err) {
                msgBox.textContent = 'Network error';
                msgBox.style.color = 'var(--accent-secondary)';
                msgBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
